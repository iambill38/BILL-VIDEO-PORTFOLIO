<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Photography - Bill.Worldwide</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #050505;
            --bg-card: #101010;
            --bg-hover: #1a1a1a;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent: #c0c0c0;
            --glow: rgba(255, 255, 255, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050505 0%, #1a1a1a 100%);
            z-index: -2;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(25px, 25px); }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(5, 5, 5, 0.5);
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            background: rgba(5, 5, 5, 0.8);
            border-bottom-color: var(--border-hover);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.1rem, 5vw, 1.5rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-primary);
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            margin-left: auto;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Mobile Navigation */
        @media (max-width: 768px) {
            nav {
                padding: 1rem;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                gap: 0;
                background: rgba(5, 5, 5, 0.95);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid var(--border);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
            }

            .nav-links.active {
                max-height: 500px;
            }

            .nav-links li {
                border-bottom: 1px solid var(--border);
            }

            .nav-links a {
                display: block;
                padding: 1rem 1.5rem;
                font-size: 1rem;
            }

            .nav-links a::after {
                display: none;
            }

            .nav-links a:active {
                background: var(--bg-hover);
                color: var(--accent);
            }
        }

        /* Hero Section */
        .hero {
            min-height: clamp(50vh, 80vh, 100vh);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1.5rem, 5vw, 2rem);
            margin-top: clamp(50px, 12vw, 80px);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse 800px 400px at 50% 0%, rgba(192, 192, 192, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            z-index: 1;
            animation: heroFadeIn 0.8s ease-out;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.75rem, 7vw, 3.5rem);
            font-weight: 700;
            margin-bottom: clamp(0.75rem, 3vw, 1rem);
            letter-spacing: -1px;
            line-height: 1.1;
            animation: slideInDown 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hero p {
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            padding: 0 clamp(1rem, 5vw, 2rem);
            animation: slideInUp 1.2s ease-out 0.3s both;
            line-height: 1.5;
        }

        @keyframes heroFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-80px) scale(0.9);
                letter-spacing: 0px;
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                letter-spacing: -1px;
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px);
            }
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(1.5rem, 5vw, 2rem);
        }

        /* Bill.TV Section */
        .billtv-section {
            margin-top: clamp(2rem, 8vw, 3rem);
        }

        .billtv-section h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.25rem, 5vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: clamp(1.5rem, 5vw, 2rem);
            word-break: break-word;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Footer */
        footer {
            padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 5vw, 2rem);
            border-top: 1px solid var(--border);
            text-align: center;
            background: rgba(16, 16, 16, 0.3);
            margin-top: clamp(4rem, 10vw, 6rem);
        }

        footer p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
        }

        footer p:last-child {
            margin-top: 1rem;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
        }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .billtv-section h2 {
                margin-bottom: 1.5rem;
            }

            .video-wrapper {
                border-radius: 8px;
            }
        }

        @media (max-width: 600px) {
            .hero {
                min-height: clamp(45vh, 70vh, 90vh);
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <!-- Navigation -->
    <nav id="navbar">
        <a href="BILL.WORLDWIDECOM.html" class="logo">BILL.WORLDWIDE</a>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="WELCOMEBILLWORLDWIDE.html">HOME</a></li>
            <li><a href="https://www.instagram.com/iambill38/">INSTAGRAM</a></li>
            <li><a href="https://www.youtube.com/channel/UCEGbV_e-_jAzwsXWWcLuidA">YOUTUBE</a></li>
            <li><a href="https://www.instagram.com/_bybill00/">PHOTOGRAPHY</a></li>
            <li><a href="ABOUTBILLWORLDWIDE.html">ABOUT</a></li>
            <li><a href="CONTACT ME.html">CONTACT</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Bill's Archive</h1>
            <p>Portraits, fashion editorials, and visual moments captured through creative vision</p>
        </div>
    </section>

    <!-- Bill.TV Section -->
    <div class="container">
        <div class="billtv-section">
            <h2>LATEST ON BILL.TV:</h2>
            <div class="video-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>Bill.Worldwide</p>
        <p>&copy; 2026 All Rights Reserved</p>
        <p>Designed & Developed by Bill Kongolo</p>
    </footer>

    <script>
        // Hamburger Menu Toggle
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');

        hamburgerBtn.addEventListener('click', () => {
            hamburgerBtn.classList.toggle('active');
            navLinks.classList.toggle('active');
            hamburgerBtn.setAttribute('aria-expanded', 
                hamburgerBtn.getAttribute('aria-expanded') === 'false' ? 'true' : 'false'
            );
        });

        // Close menu when a link is clicked
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                hamburgerBtn.classList.remove('active');
                navLinks.classList.remove('active');
                hamburgerBtn.setAttribute('aria-expanded', 'false');
            });
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('nav')) {
                hamburgerBtn.classList.remove('active');
                navLinks.classList.remove('active');
                hamburgerBtn.setAttribute('aria-expanded', 'false');
            }
        });

        // Configurable featured video
        const featuredVideo = "csQwbzc1LQ8";

        function renderFeaturedVideo(videoId) {
            const wrapper = document.getElementById('videoWrapper');
            const iframe = document.createElement('iframe');
            
            iframe.src = `https://www.youtube.com/embed/${videoId}?modestbranding=1`;
            iframe.title = "Latest video on Bill.TV";
            iframe.loading = "lazy";
            iframe.referrerPolicy = "strict-origin-when-cross-origin";
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
            iframe.allowFullscreen = true;
            
            wrapper.appendChild(iframe);
        }

        renderFeaturedVideo(featuredVideo);

        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
