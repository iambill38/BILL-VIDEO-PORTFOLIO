<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography - Bill.Worldwide</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #050505;
            --bg-card: #101010;
            --bg-hover: #1a1a1a;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent: #c0c0c0;
            --glow: rgba(255, 255, 255, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050505 0%, #1a1a1a 100%);
            z-index: -2;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(25px, 25px); }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(5, 5, 5, 0.5);
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            background: rgba(5, 5, 5, 0.8);
            border-bottom-color: var(--border-hover);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.5rem;
            }

            .nav-links {
                gap: 1.5rem;
                font-size: 0.85rem;
            }

            .logo {
                font-size: 1.2rem;
            }
        }

        /* Hero Section */
        .hero {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin-top: 80px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse 800px 400px at 50% 0%, rgba(192, 192, 192, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            z-index: 1;
            animation: heroFadeIn 0.8s ease-out;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            line-height: 1.1;
            animation: slideInDown 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            animation: slideInUp 1.2s ease-out 0.3s both;
        }

        @keyframes heroFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-80px) scale(0.9);
                letter-spacing: 0px;
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                letter-spacing: -1px;
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            group: 1;
        }

        .gallery-item:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .gallery-image svg {
            width: 4rem;
            height: 4rem;
            color: var(--text-secondary);
            stroke: var(--text-secondary);
        }

        .gallery-item:hover .gallery-image {
            transform: scale(1.1);
            filter: brightness(0.7);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay svg {
            width: 2.5rem;
            height: 2.5rem;
            color: var(--accent);
            stroke: var(--accent);
        }
        .gallery-item:hover .gallery-info {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-info h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .gallery-info p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Filter Section */
        .filter-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-dark);
            border-color: var(--accent);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            animation: zoomIn 0.3s ease;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            object-fit: contain;
            font-size: 10rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-image svg {
            width: 10rem;
            height: 10rem;
            color: var(--accent);
            stroke: var(--accent);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(192, 192, 192, 0.2);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            padding: 0;
        }

        .lightbox-close:hover {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .lightbox-close svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 2rem;
            pointer-events: none;
            transform: translateY(-50%);
        }

        .lightbox-nav button {
            pointer-events: all;
            width: 50px;
            height: 50px;
            background: rgba(192, 192, 192, 0.2);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .lightbox-nav button:hover {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .lightbox-nav button svg {
            width: 1.2rem;
            height: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Footer */
        footer {
            padding: 3rem 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
            background: rgba(16, 16, 16, 0.3);
            margin-top: 6rem;
        }

        footer p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 1rem;
            }

            .lightbox-close,
            .lightbox-nav button {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>

    <!-- Navigation -->
    <nav id="navbar">
        <a href="index.html" class="logo">BILL.WORLDWIDE</a>
        <ul class="nav-links">
            <li><a href="WELCOMEBILLWORLDWIDE.html">HOME</a></li>
            <li><a href="https://www.instagram.com/iambill38/">INSTAGRAM</a></li>
            <li><a href="https://www.youtube.com/channel/UCEGbV_e-_jAzwsXWWcLuidA">YOUTUBE</a></li>
            <li><a href="https://www.instagram.com/_bybill00/">PHOTOGRAPHY</a></li>
            <li><a href="ABOUTBILLWORLDWIDE.html">ABOUT</a></li>
            <li><a href="CONTACT ME.html">CONTACT</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Bill's Archive</h1>
            <p>Portraits, fashion editorials, and visual moments captured through creative vision</p>
        </div>
    </section>

    <!-- Gallery Section -->
    <div class="container">
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="portraits">Portraits</button>
            <button class="filter-btn" data-filter="fashion">Fashion</button>
            <button class="filter-btn" data-filter="lifestyle">Lifestyle</button>
            <button class="filter-btn" data-filter="editorial">Editorial</button>
        </div>

        <div class="gallery" id="gallery">
            <!-- Gallery items will be generated here -->
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <div class="lightbox-image" id="lightboxImage"></div>
            <button class="lightbox-close" onclick="closeLightbox()">
                <svg data-lucide="x"></svg>
            </button>
            <div class="lightbox-nav">
                <button onclick="previousImage()">
                    <svg data-lucide="chevron-left"></svg>
                </button>
                <button onclick="nextImage()">
                    <svg data-lucide="chevron-right"></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>Bill.Worldwide</p>
        <p>&copy; 2026 All Rights Reserved</p>
        <p style="margin-top: 1rem;">Designed & Developed by Bill Kongolo</p>
    </footer>

    <script>
        // Gallery data with Lucide-style SVG icons
        const galleryData = [
            { id: 1, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>', category: 'portraits', title: 'Portrait Series', description: 'Studio Portrait' },
            { id: 2, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>', category: 'fashion', title: 'Fashion Editorial', description: 'High Fashion' },
            { id: 3, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>', category: 'editorial', title: 'Magazine Cover', description: 'Editorial Work' },
            { id: 4, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>', category: 'lifestyle', title: 'Lifestyle Moment', description: 'Candid Capture' },
            { id: 5, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12v6H6z M4 9h16v10H4z M9 19v3m6-3v3"/></svg>', category: 'fashion', title: 'Runway Show', description: 'Fashion Event' },
            { id: 6, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v6m0 6v6"/><path d="M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24"/><path d="M1 12h6m6 0h6"/><path d="M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"/></svg>', category: 'portraits', title: 'Character Study', description: 'Portrait Series' },
            { id: 7, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="8"/></svg>', category: 'editorial', title: 'Color Study', description: 'Creative Composition' },
            { id: 8, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>', category: 'lifestyle', title: 'Street Photography', description: 'Urban Moments' },
            { id: 9, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M12 14c-5 0-8 2-8 5v3h16v-3c0-3-3-5-8-5z"/></svg>', category: 'fashion', title: 'Jewelry Campaign', description: 'Product Photography' },
            { id: 10, icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>', category: 'portraits', title: 'Beauty Portrait', description: 'Beauty Photography' },
            { id: 11, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>', category: 'editorial', title: 'Artistic Vision', description: 'Fine Art Photography' },
            { id: 12, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>', category: 'lifestyle', title: 'Moments', description: 'Life in Motion' }
        ];

        let currentFilter = 'all';
        let currentImageIndex = 0;
        let filteredImages = galleryData;

        // Initialize gallery
        function initGallery() {
            renderGallery();
            setupFilterButtons();
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            filteredImages = currentFilter === 'all' 
                ? galleryData 
                : galleryData.filter(item => item.category === currentFilter);

            filteredImages.forEach((item, index) => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.innerHTML = `
                    <div class="gallery-image">
                        ${item.icon}
                    </div>
                    <div class="gallery-overlay">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 2.5rem; height: 2.5rem;"><polyline points="5 12 19 12"></polyline><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </div>
                    <div class="gallery-info">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                `;
                galleryItem.addEventListener('click', () => openLightbox(index));
                gallery.appendChild(galleryItem);
            });
        }

        function setupFilterButtons() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderGallery();
                });
            });
        }

        function openLightbox(index) {
            currentImageIndex = index;
            const image = filteredImages[index];
            const lightboxImage = document.getElementById('lightboxImage');
            const iconSvg = image.icon.replace(/viewBox="0 0 24 24"/, 'viewBox="0 0 24 24" style="width: 10rem; height: 10rem;"');
            lightboxImage.innerHTML = iconSvg;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % filteredImages.length;
            openLightbox(currentImageIndex);
        }

        function previousImage() {
            currentImageIndex = (currentImageIndex - 1 + filteredImages.length) % filteredImages.length;
            openLightbox(currentImageIndex);
        }

        // Close lightbox on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') previousImage();
        });

        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Initialize
        initGallery();
    </script>
</body>
</html>
